<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>pop a color!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #d6eef7;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Comic Sans MS', 'Comic Sans', sans-serif;
  }

  #wrap {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #inner {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px 12px 16px;
  }

  @media (min-width: 540px) {
    body { background: #b8dcea; }
    #inner {
      width: 380px;
      height: 660px;
      border-radius: 20px;
      background: #d6eef7;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      padding: 16px 16px 20px;
    }
    #swatch { font-size: 14px; gap: 7px; }
    #swatch-hex { font-size: 13px; padding: 3px 8px; }
    #swatch-none { font-size: 13px; }
  }

  canvas {
    width: 100%;
    flex: 1 1 auto;
    display: block;
    border-radius: 12px;
    cursor: crosshair;
    touch-action: none;
    transition: opacity 0.7s ease;
  }
  canvas.faded { opacity: 0; }

  #bottom-row {
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    padding-top: 14px;
    min-width: 0;
    overflow: hidden;
  }

  #swatch {
    flex: 1 1 0;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: nowrap;
    overflow: hidden;
    min-width: 0;
    font-size: clamp(22px, 6.5vw, 26px);
    color: #555;
    white-space: nowrap;
    padding-right: 0;
    transition: opacity 0.3s;
  }


  #swatch-hex {
    font-family: 'Comic Sans MS', 'Comic Sans', sans-serif;
    font-size: clamp(20px, 6vw, 24px);
    cursor: pointer;
    padding: 5px 12px;
    border-radius: 7px;
    border: 1px solid rgba(0,0,0,0.14);
    background: transparent;
    transition: background 0.07s, color 0.07s;
    user-select: none;
    -webkit-user-select: none;
    flex-shrink: 0;
  }
  #swatch-hex:hover, #swatch-hex:active { filter: brightness(0.92); }
  #swatch-hex.copied { outline: 2px solid #1a7a3a; }
  #swatch-none { color: #999; font-size: clamp(22px, 7.5vw, 26px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #nuke-btn {
    position: absolute;
    right: 0;
    top: 14px; bottom: 0;
    margin: auto 0;
    height: fit-content;
    font-size: clamp(20px, 6vw, 24px);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.85);
    transition: opacity 0.4s, transform 0.15s;
  }
  #nuke-btn.visible { opacity: 1; pointer-events: auto; transform: scale(1); }
  #nuke-btn:active { transform: scale(0.9); }
  #nuke-btn.used { opacity: 0.3; pointer-events: none; }

  /* bomb drop */
  #bomb-drop {
    position: absolute;
    left: 50%;
    top: -80px;
    transform: translateX(-50%);
    font-size: clamp(48px, 14vw, 80px);
    line-height: 1;
    pointer-events: none;
    z-index: 21;
    opacity: 0;
  }
  @keyframes bomb-fall {
    0%   { top: -80px; opacity: 1; }
    100% { top: 60%; opacity: 1; }
  }
  #bomb-drop.animating {
    animation: bomb-fall 0.7s cubic-bezier(0.4,0,1,1) forwards;
  }

  /* mushroom */
  #mushroom {
    position: absolute;
    left: 50%;
    bottom: 15%;
    transform: translateX(-50%) scale(0);
    font-size: 80vw;
    line-height: 1;
    pointer-events: none;
    z-index: 20;
    transform-origin: bottom center;
    filter: drop-shadow(0 0 24px rgba(255,140,0,0.7));
  }
  @media (min-width: 540px) { #mushroom { font-size: 320px; bottom: 18%; } }

  @keyframes nuke-rise {
    0%   { transform: translateX(-50%) scale(0.05); opacity: 1; }
    60%  { transform: translateX(-50%) scale(1.1);  opacity: 1; }
    80%  { transform: translateX(-50%) scale(1.0);  opacity: 1; }
    100% { transform: translateX(-50%) scale(1.05); opacity: 0; }
  }
  #mushroom.animating {
    animation: nuke-rise 2.2s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  /* big centered color reveal */
  #color-reveal {
    position: absolute;
    left: 0; right: 0;
    bottom: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 4vw, 20px);
    font-size: clamp(22px, 6.5vw, 28px);
    color: #555;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    z-index: 30;
    transition: bottom 0.9s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease, font-size 0.9s cubic-bezier(0.22,1,0.36,1);
  }
  #color-reveal.risen {
    bottom: 38%;
    font-size: clamp(28px, 8vw, 38px);
    opacity: 1;
    pointer-events: auto;
  }
  #nuke-flavor {
    font-size: clamp(22px, 6.5vw, 28px);
    color: #555;
    text-align: center;
    line-height: 1.6;
    padding: 0 12px;
    white-space: normal;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #nuke-flavor.visible { opacity: 1; }

  #reveal-row {
    display: flex;
    align-items: center;
    gap: clamp(10px, 3vw, 18px);
  }
  #reveal-hex {
    font-family: 'Comic Sans MS', 'Comic Sans', sans-serif;
    font-size: clamp(20px, 6vw, 28px);
    cursor: pointer;
    padding: 5px 12px;
    border-radius: 7px;
    border: 1px solid rgba(0,0,0,0.14);
    background: transparent;
    transition: background 0.07s, color 0.07s;
    user-select: none;
    -webkit-user-select: none;
  }
  #reveal-hex:hover, #reveal-hex:active { filter: brightness(0.92); }
  #reveal-hex.copied { outline: 2px solid #1a7a3a; }

  #reset-btn {
    font-family: 'Comic Sans MS', 'Comic Sans', sans-serif;
    font-size: clamp(16px, 4.5vw, 20px);
    color: #555;
    cursor: pointer;
    padding: 6px 18px;
    border-radius: 7px;
    border: 1px solid rgba(0,0,0,0.14);
    background: transparent;
    transition: background 0.15s, opacity 0.8s ease;
    user-select: none;
    -webkit-user-select: none;
    opacity: 0;
  }
  #reset-btn.visible { opacity: 1; }
  #reset-btn:hover, #reset-btn:active { background: rgba(0,0,0,0.07); }
</style>
</head>
<body>
<div id="wrap">
  <div id="inner">
    <canvas id="bpc"></canvas>
    <div id="bottom-row">
      <div id="swatch"><div id="swatch-none">pop a balloon to pick a color</div></div>
      <button id="nuke-btn">💣</button>
    </div>
    <div id="bomb-drop">💣</div>
    <div id="mushroom">🍄</div>
    <div id="color-reveal">
      <div id="nuke-flavor"></div>
      <div id="reveal-row">your color: <div id="reveal-hex"></div></div>
      <button id="reset-btn">i don't like that color</button>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas     = document.getElementById('bpc');
  const ctx        = canvas.getContext('2d');
  const nukeBtn    = document.getElementById('nuke-btn');
  const mushroomEl = document.getElementById('mushroom');
  const colorReveal= document.getElementById('color-reveal');
  const revealHex  = document.getElementById('reveal-hex');
  let W=1, H=1, S=1;

  function resize(){
    W = canvas.offsetWidth  || 300;
    H = canvas.offsetHeight || 500;
    canvas.width  = W;
    canvas.height = H;
    S = Math.min(2.0, Math.max(1.0, 540 / Math.max(W, 200)));
  }

  const BASE_ALEN=46, BASE_BOW=28;
  let balloons=[], projs=[], pops=[], angle=-Math.PI/2, frame=0, started=false;
  let lifetimePops=0, nukeUnlocked=false, nuking=false, frozen=false;

  function AX(){ return W/2; }
  function AY(){ return H-30*S; }
  function ALEN(){ return BASE_ALEN*S; }
  function BOWR(){ return BASE_BOW*S; }

  function rndColor(){
    return '#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
  }

  function contrastColor(hex){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return (r*299+g*587+b*114)/1000>128?'#111':'#eee';
  }

  function applyColor(el,hex){
    el.style.background=hex;
    el.style.color=contrastColor(hex);
    el.style.borderColor='transparent';
  }

  function setLastColor(hex){
    const sw=document.getElementById('swatch');
    sw.innerHTML=`your color: <div id="swatch-hex">${hex.toUpperCase()}</div>`;
    const hexEl=document.getElementById('swatch-hex');
    applyColor(hexEl,hex);
    hexEl.addEventListener('click',function(){
      const val=hex.toUpperCase(), el=this;
      function done(){ el.textContent='copied!'; setTimeout(()=>{ el.textContent=val; },1400); }
      if(navigator.clipboard) navigator.clipboard.writeText(val).then(done).catch(()=>fbCopy(val,done));
      else fbCopy(val,done);
    });
  }

  function fbCopy(text,cb){
    const ta=document.createElement('textarea'); ta.value=text;
    ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta);
    ta.focus(); ta.select(); try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta); cb();
  }

  function onPop(){
    lifetimePops++;
    if(lifetimePops>=10 && !nukeUnlocked){
      nukeUnlocked=true;
      nukeBtn.classList.add('visible');
      document.getElementById('swatch').style.paddingRight='clamp(52px, 14vw, 64px)';
    }
  }

  // ── Nuke sequence ────────────────────────────────────────────────────────

  const CITIES=['Tokyo','Paris','London','New York','Sydney','Berlin','Cairo','Mumbai','São Paulo','Toronto','Seoul','Moscow','Lagos','Buenos Aires','Dubai','Bangkok','Istanbul','Mexico City','Jakarta','Nairobi','Vienna','Oslo','Reykjavik','Ulaanbaatar','Timbuktu','Djibouti','Minsk','Pyongyang','Kathmandu','Bogotá'];
  const COLOR_NAMES=['red','blue','green','yellow','orange','purple','pink','brown','black','white','gray','cyan','magenta','lime','navy','teal','maroon','olive','coral','salmon','turquoise','violet','indigo','gold','silver','beige','lavender','mint','peach','rose'];

  function startNuke(){
    if(nuking) return;
    nuking=true; frozen=true;
    nukeBtn.classList.add('used');

    const city=CITIES[Math.floor(Math.random()*CITIES.length)];
    document.getElementById('nuke-flavor').innerHTML=`congratulations,<br>you have nuked ${city}<br>and started world war iii.<br>i hope you're happy with`;

    // pop all balloons
    balloons.forEach(b=>{ pops.push(mkPop(b.x,b.y,b.color)); b.alive=false; });
    balloons=[]; projs=[];

    // Phase 1: fade canvas out (0ms)
    canvas.classList.add('faded');

    // Phase 2: start rolling color immediately, show in swatch + reveal
    const sw=document.getElementById('swatch');
    sw.innerHTML=`your color: <div id="swatch-hex">#888888</div>`;
    applyColor(document.getElementById('swatch-hex'),'#888');
    applyColor(revealHex,'#888');
    revealHex.textContent='#888888';

    let rolling=true;
    let rollDelay=60;
    let rollTimeout=null;
    function rollTick(){
      if(!rolling) return;
      const hex=rndColor();
      const hexEl=document.getElementById('swatch-hex');
      if(hexEl){ hexEl.textContent=hex.toUpperCase(); applyColor(hexEl,hex); }
      revealHex.textContent=hex.toUpperCase(); applyColor(revealHex,hex);
      rollTimeout=setTimeout(rollTick, rollDelay);
    }
    rollTick();

    // Phase 3: bomb drops at 300ms, mushroom fires when bomb lands
    const bombEl=document.getElementById('bomb-drop');
    setTimeout(()=>{
      bombEl.classList.remove('animating');
      void bombEl.offsetWidth;
      bombEl.classList.add('animating');
      bombEl.addEventListener('animationend', ()=>{
        bombEl.style.display='none';
        mushroomEl.classList.remove('animating');
        void mushroomEl.offsetWidth;
        mushroomEl.classList.add('animating');
      }, {once:true});
    }, 300);

    // Phase 4: rise color-reveal overlay at 2.4s (mushroom fading)
    setTimeout(()=>{
      // hide swatch row
      document.getElementById('swatch').style.opacity='0';
      nukeBtn.style.opacity='0';
      // rise
      colorReveal.classList.add('risen');
    }, 2400);

    // Phase 5: slow down over 1.5s then settle
    setTimeout(()=>{
      const slowStart=Date.now();
      const slowDur=1500;
      function slowDown(){
        const t=Math.min((Date.now()-slowStart)/slowDur,1);
        rollDelay=60+t*t*640; // ease from 60ms → 700ms
        if(t<1){
          rollTimeout=setTimeout(slowDown, rollDelay);
        } else {
          rolling=false;
          clearTimeout(rollTimeout);
          const finalHex=rndColor();
          revealHex.textContent=finalHex.toUpperCase();
          applyColor(revealHex,finalHex);
          setRevealCopyable(finalHex);
          document.getElementById('nuke-flavor').classList.add('visible');
          const rndName=COLOR_NAMES[Math.floor(Math.random()*COLOR_NAMES.length)];
          const rb=document.getElementById('reset-btn');
          rb.textContent=`but i wanted ${rndName}`;
          rb.classList.add('visible');
        }
      }
      slowDown();
    }, 3300);

    mushroomEl.addEventListener('animationend',()=>{
      mushroomEl.classList.remove('animating');
    },{once:true});
  }

  function setRevealCopyable(hex){
    revealHex.style.cursor='pointer';
    revealHex.style.pointerEvents='auto';
    revealHex.onclick=function(){
      const val=hex.toUpperCase(), el=this;
      function done(){ el.textContent='copied!'; setTimeout(()=>{ el.textContent=val; },1400); }
      if(navigator.clipboard) navigator.clipboard.writeText(val).then(done).catch(()=>fbCopy(val,done));
      else fbCopy(val,done);
    };
  }

  nukeBtn.addEventListener('click', startNuke);

  const resetBtn = document.getElementById('reset-btn');
  resetBtn.addEventListener('click', ()=>{
    // reset all state
    frozen=false; nuking=false; nukeUnlocked=false; lifetimePops=0;
    balloons=[]; projs=[]; pops=[];
    // restore UI
    canvas.classList.remove('faded');
    colorReveal.classList.remove('risen');
    nukeBtn.classList.remove('visible','used');
    nukeBtn.style.opacity='';
    document.getElementById('reset-btn').classList.remove('visible');
    document.getElementById('bomb-drop').classList.remove('animating');
    document.getElementById('bomb-drop').style.display='';
    const flavor=document.getElementById('nuke-flavor');
    flavor.classList.remove('visible'); flavor.innerHTML='';
    const sw=document.getElementById('swatch');
    sw.style.opacity='';
    sw.style.paddingRight='';
    sw.innerHTML='<div id="swatch-none">pop a balloon to pick a color</div>';
    fillBalloons();
  });

  // ── Game objects ─────────────────────────────────────────────────────────

  function fillBalloons(){
    const count=Math.floor((W*H)/14000);
    for(let i=0;i<count;i++){
      const b=mkBalloon(); b.y=H*0.1+Math.random()*H*0.85; balloons.push(b);
    }
  }

  function mkBalloon(){
    const r=(14+Math.random()*14)*S;
    return{ x:r+Math.random()*(W-r*2), y:H+r, r, color:rndColor(),
      vy:-(0.18+Math.random()*0.32)*S, vx:(Math.random()-0.5)*0.18*S,
      alive:true, wobble:Math.random()*6.28 };
  }

  function drawBalloon(b){
    b.wobble+=0.045;
    const x=b.x+Math.sin(b.wobble)*2*S, y=b.y;
    ctx.beginPath(); ctx.moveTo(x,y+b.r*1.1+3*S);
    ctx.quadraticCurveTo(x+9*S,y+b.r*1.1+22*S,x-6*S,y+b.r*1.1+42*S);
    ctx.strokeStyle='rgba(70,50,30,0.45)'; ctx.lineWidth=S; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(x,y,b.r,b.r*1.15,0,0,Math.PI*2);
    ctx.fillStyle=b.color; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y+b.r*1.1,3*S,0,Math.PI*2); ctx.fillStyle=b.color; ctx.fill();
    ctx.beginPath(); ctx.ellipse(x-b.r*.28,y-b.r*.3,b.r*.22,b.r*.17,-0.4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.38)'; ctx.fill();
  }

  function mkProj(){
    return{ x:AX()+Math.cos(angle)*ALEN(), y:AY()+Math.sin(angle)*ALEN(),
      vx:Math.cos(angle)*10*S, vy:Math.sin(angle)*10*S, alive:true };
  }

  function drawProj(p){
    const a=Math.atan2(p.vy,p.vx), L=20*S;
    ctx.beginPath(); ctx.moveTo(p.x-Math.cos(a)*L,p.y-Math.sin(a)*L); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='#412402'; ctx.lineWidth=1.5*S; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x,p.y);
    ctx.lineTo(p.x-Math.cos(a-.32)*9*S,p.y-Math.sin(a-.32)*9*S);
    ctx.lineTo(p.x-Math.cos(a+.32)*9*S,p.y-Math.sin(a+.32)*9*S);
    ctx.closePath(); ctx.fillStyle='#888780'; ctx.fill();
  }

  function mkPop(x,y,color){
    return{ x,y,color,life:1,alive:true,
      pts:Array.from({length:10},(_,i)=>({ a:(i/10)*6.28+Math.random()*.4, d:0, s:(1.8+Math.random()*2.2)*S })) };
  }

  function drawPop(p){
    p.life-=0.055; if(p.life<=0){ p.alive=false; return; }
    ctx.globalAlpha=p.life;
    p.pts.forEach(pt=>{ pt.d+=pt.s;
      ctx.beginPath(); ctx.arc(p.x+Math.cos(pt.a)*pt.d,p.y+Math.sin(pt.a)*pt.d,3*S,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill(); });
    ctx.beginPath(); ctx.arc(p.x,p.y,(1-p.life)*38*S,0,Math.PI*2);
    ctx.strokeStyle=p.color; ctx.lineWidth=2.5*S; ctx.stroke();
    ctx.globalAlpha=1;
  }

  function drawBow(){
    const ax=AX(), ay=AY(), bR=BOWR();
    const a1=angle-Math.PI*.44, a2=angle+Math.PI*.44;
    ctx.beginPath(); ctx.arc(ax,ay,bR,a1,a2);
    ctx.strokeStyle='#412402'; ctx.lineWidth=4*S; ctx.stroke();
    const e1x=ax+Math.cos(a1)*bR, e1y=ay+Math.sin(a1)*bR;
    const e2x=ax+Math.cos(a2)*bR, e2y=ay+Math.sin(a2)*bR;
    const px=ax-Math.cos(angle)*6*S, py=ay-Math.sin(angle)*6*S;
    ctx.beginPath(); ctx.moveTo(e1x,e1y); ctx.lineTo(px,py); ctx.lineTo(e2x,e2y);
    ctx.strokeStyle='#B4B2A9'; ctx.lineWidth=1.5*S; ctx.stroke();
    const tx=ax+Math.cos(angle)*ALEN(), ty=ay+Math.sin(angle)*ALEN();
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(tx,ty);
    ctx.strokeStyle='#633806'; ctx.lineWidth=2*S; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx,ty);
    ctx.lineTo(tx-Math.cos(angle-.35)*11*S,ty-Math.sin(angle-.35)*11*S);
    ctx.lineTo(tx-Math.cos(angle+.35)*11*S,ty-Math.sin(angle+.35)*11*S);
    ctx.closePath(); ctx.fillStyle='#888780'; ctx.fill();
  }

  function drawBg(){
    ctx.fillStyle='#C4E6F5'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,0.65)';
    [[.12,.07,.09,.038],[.36,.05,.07,.030],[.72,.09,.09,.044],[.55,.16,.06,.030],[.88,.06,.07,.035]]
    .forEach(([cx,cy,cw,ch])=>{
      const x=cx*W,y=cy*H,w=cw*W,h=ch*H;
      ctx.beginPath(); ctx.ellipse(x,y,w,h,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+w*.35,y+h*.38,w*.65,h*.75,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x-w*.31,y+h*.29,w*.55,h*.7,0,0,Math.PI*2); ctx.fill();
    });
    ctx.fillStyle='#4A7C2A'; ctx.fillRect(0,H-18*S,W,18*S);
    ctx.fillStyle='#3C621E'; ctx.fillRect(0,H-20*S,W,4*S);
  }

  function shoot(){ if(!frozen) projs.push(mkProj()); }

  function setAngle(mx,my){
    let a=Math.atan2(my-AY(),mx-AX());
    if(a>0) a=mx<AX()?-Math.PI:0;
    angle=a;
  }

  function canvasXY(cx,cy){
    const r=canvas.getBoundingClientRect();
    return [(cx-r.left)*(W/r.width),(cy-r.top)*(H/r.height)];
  }

  canvas.addEventListener('mousemove',e=>{ if(!frozen){ const [mx,my]=canvasXY(e.clientX,e.clientY); setAngle(mx,my); } });
  canvas.addEventListener('click',    e=>{ if(!frozen){ const [mx,my]=canvasXY(e.clientX,e.clientY); setAngle(mx,my); shoot(); } });
  canvas.addEventListener('touchstart',e=>{ e.preventDefault(); if(!frozen){ const t=e.touches[0]; const [mx,my]=canvasXY(t.clientX,t.clientY); setAngle(mx,my); } },{passive:false});
  canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(!frozen){ const t=e.touches[0]; const [mx,my]=canvasXY(t.clientX,t.clientY); setAngle(mx,my); } },{passive:false});
  canvas.addEventListener('touchend',  e=>{ e.preventDefault(); if(!frozen) shoot(); },{passive:false});

  window.addEventListener('resize',()=>{ resize(); if(!frozen){ balloons=[]; projs=[]; pops=[]; fillBalloons(); } });

  function loop(){
    if(!started || canvas.offsetHeight!==H){ resize(); if(!started) fillBalloons(); started=true; }
    ctx.clearRect(0,0,W,H); drawBg(); frame++;

    if(!frozen && frame%80===0) balloons.push(mkBalloon());

    if(!frozen){
      balloons.forEach(b=>{
        if(!b.alive)return;
        b.x+=b.vx; b.y+=b.vy;
        if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx);}
        if(b.x>W-b.r){b.x=W-b.r;b.vx=-Math.abs(b.vx);}
        if(b.y<-b.r*2) b.alive=false;
      });
      projs.forEach(p=>{
        if(!p.alive)return; p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>W||p.y<0||p.y>H) p.alive=false;
      });
      projs.forEach(proj=>{
        if(!proj.alive)return;
        balloons.forEach(b=>{
          if(!b.alive)return;
          const dx=proj.x-b.x, dy=proj.y-b.y;
          if(Math.sqrt(dx*dx+dy*dy)<b.r){
            b.alive=false; proj.alive=false;
            pops.push(mkPop(b.x,b.y,b.color));
            setLastColor(b.color);
            onPop();
          }
        });
      });
    }

    balloons=balloons.filter(b=>b.alive);
    projs=projs.filter(p=>p.alive);
    balloons.forEach(drawBalloon);
    projs.forEach(drawProj);
    pops.forEach(drawPop);
    pops=pops.filter(p=>p.alive);
    if(!frozen) drawBow();
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
